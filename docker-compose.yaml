version: "3.9"

services:

  # =========================
  # API (ASP.NET Core)
  # =========================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-api
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Redis__ConnectionString=redis:6379
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=Blog;User Id=sa;Password=YourStrong!Pass123;TrustServerCertificate=True;

  # =========================
  # REDIS
  # =========================
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  # =========================
  # SQL SERVER
  # =========================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Pass123
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Pass123' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s